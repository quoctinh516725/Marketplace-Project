components:
  schemas:
    VoucherInfo:
      type: object
      properties:
        id:
          type: string
          example: "vou123"
        code:
          type: string
          example: "SAVE10"
        name:
          type: string
          example: "10% Off Voucher"
        description:
          type: string
          nullable: true
          example: "Get 10% off on all products"
        type:
          type: string
          enum: [PERCENTAGE, FIXED]
          example: "PERCENTAGE"
        value:
          type: number
          example: 10
        minOrderValue:
          type: number
          nullable: true
          example: 100
        maxDiscount:
          type: number
          nullable: true
          example: 50
        usageLimit:
          type: integer
          nullable: true
          example: 100
        usedCount:
          type: integer
          example: 25
        startDate:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2024-12-31T23:59:59Z"
        isActive:
          type: boolean
          example: true
        shopId:
          type: string
          nullable: true
          example: "shop123"
        shop:
          type: object
          nullable: true
          properties:
            id:
              type: string
              example: "shop123"
            name:
              type: string
              example: "Apple Store"
    VoucherCreateRequest:
      type: object
      required:
        - code
        - name
        - type
        - value
        - startDate
        - endDate
      properties:
        code:
          type: string
          example: "WELCOME10"
        name:
          type: string
          example: "Welcome Voucher"
        description:
          type: string
          example: "10% off for new customers"
        type:
          type: string
          enum: [PERCENTAGE, FIXED]
          example: "PERCENTAGE"
        value:
          type: number
          example: 10
        minOrderValue:
          type: number
          example: 50
        maxDiscount:
          type: number
          example: 20
        usageLimit:
          type: integer
          example: 100
        startDate:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2024-12-31T23:59:59Z"
        shopId:
          type: string
          nullable: true
          example: "shop123"
    VoucherUpdateRequest:
      type: object
      properties:
        name:
          type: string
          example: "Updated Voucher Name"
        description:
          type: string
          example: "Updated description"
        value:
          type: number
          example: 15
        minOrderValue:
          type: number
          example: 75
        maxDiscount:
          type: number
          example: 30
        usageLimit:
          type: integer
          example: 200
        startDate:
          type: string
          format: date-time
          example: "2024-02-01T00:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2024-11-30T23:59:59Z"
        isActive:
          type: boolean
          example: true
    VoucherListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/VoucherInfo"
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10
            total:
              type: integer
              example: 50
            totalPages:
              type: integer
              example: 5
