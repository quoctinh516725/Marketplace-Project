paths:
  /roles:
    get:
      summary: Get all roles (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleListResponse"
    post:
      summary: Create role (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreateRequest"
      responses:
        "200":
          description: Role created successfully
  /roles/{id}:
    get:
      summary: Get role by ID (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleInfo"
    put:
      summary: Update role (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdateRequest"
      responses:
        "200":
          description: Role updated successfully
    delete:
      summary: Delete role (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Role deleted successfully
  /users/{userId}/roles:
    post:
      summary: Assign roles to user (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleAssignRequest"
      responses:
        "200":
          description: Roles assigned successfully
    delete:
      summary: Revoke roles from user (Admin only)
      tags:
        - Roles
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleAssignRequest"
      responses:
        "200":
          description: Roles revoked successfully
