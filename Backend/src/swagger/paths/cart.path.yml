paths:
  /cart:
    get:
      summary: Get cart items
      tags:
        - Cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    post:
      summary: Add item to cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
      responses:
        "200":
          description: Item added successfully
        "400":
          description: Invalid request
  /cart/{id}:
    patch:
      summary: Update cart item quantity
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Variant ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartQuantityRequest"
      responses:
        "200":
          description: Quantity updated successfully
        "400":
          description: Invalid quantity
        "404":
          description: Item not found
    delete:
      summary: Remove item from cart
      tags:
        - Cart
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Variant ID
      responses:
        "200":
          description: Item removed successfully
        "404":
          description: Item not found
