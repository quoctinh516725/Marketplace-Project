paths:
  /chat/conversations:
    get:
      summary: Lấy cuộc trò chuyện của người dùng
      tags:
        - Chat
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListResponse"
    post:
      summary: Bắt đầu cuộc trò chuyện mới
      tags:
        - Chat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - receiverId
              properties:
                receiverId:
                  type: string
                  example: "user123"
      responses:
        "200":
          description: Bắt đầu cuộc trò chuyện thành công
  /chat/conversations/{conversationId}/messages:
    get:
      summary: Lấy tin nhắn cuộc trò chuyện
      tags:
        - Chat
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
    post:
      summary: Gửi tin nhắn
      tags:
        - Chat
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageSendRequest"
      responses:
        "200":
          description: Gửi tin nhắn thành công
  /chat/conversations/{conversationId}/mark-read:
    post:
      summary: Đánh dấu tin nhắn cuộc trò chuyện đã đọc
      tags:
        - Chat
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Đánh dấu tin nhắn đã đọc
