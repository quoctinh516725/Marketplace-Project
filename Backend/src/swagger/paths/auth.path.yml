paths:
  /auth/login:
    post:
      summary: Hệ thống đăng nhập
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Đăng nhập thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Email hoặc password không đúng

        "403":
          description: Tài khoản bị khóa

        "404":
          description: Tài khoản không tồn tại
  /auth/register:
    post:
      summary: Hệ thống đăng ký
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Email hoặc username đã tồn tại
  /auth/refresh_token:
    post:
      summary: Làm mới token truy cập
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Làm mới token thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/logout:
    post:
      summary: Đăng xuất người dùng
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Đăng xuất thành công
